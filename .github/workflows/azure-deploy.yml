name: azure-deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/java-server:latest

      - name: Deploy to Azure VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AZURE_VPS_IP }}
          username: ${{ secrets.AZURE_VPS_USER }}
          password: ${{ secrets.AZURE_VPS_PASSWORD }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-server:latest
            sudo docker stop java-app || true
            sudo docker rm java-app || true
            sudo docker run -d --name java-app -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/java-server:latest