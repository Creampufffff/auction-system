name: Docker Publish

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: auction-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/auction-server:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/auction-server:${{ github.sha }}
          cache-from: type=gha,scope=auction-server
          cache-to: type=gha,mode=max,scope=auction-server

      - name: Build and push mysql image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/mysql/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/auction-mysql:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/auction-mysql:${{ github.sha }}
          cache-from: type=gha,scope=auction-mysql
          cache-to: type=gha,mode=max,scope=auction-mysql
