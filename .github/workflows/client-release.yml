name: Client Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Client version, for example 1.0.0"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  windows-client:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "value=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            "value=$("${{ github.ref_name }}".TrimStart("v"))" >> $env:GITHUB_OUTPUT
          }

      - name: Build portable Windows client
        shell: pwsh
        run: .\windows\package-client.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuctionClient-windows-x64-${{ steps.version.outputs.value }}
          path: dist/AuctionClient-windows-x64-${{ steps.version.outputs.value }}.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AuctionClient-windows-x64-${{ steps.version.outputs.value }}.zip
          generate_release_notes: true
