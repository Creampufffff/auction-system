services:
  mysql:
    image: ghcr.io/creampufffff/auction-mysql:latest
    container_name: auction-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-auction_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-auction_system}
      MYSQL_USER: ${MYSQL_USER:-auction_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-auction_password}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - mysql_data:/var/lib/mysql
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+07:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  server:
    image: ghcr.io/creampufffff/auction-server:latest
    container_name: auction-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      AUCTION_SERVER_PORT: ${AUCTION_SERVER_PORT:-5000}
      AUCTION_DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-auction_system}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=utf8
      AUCTION_DB_USERNAME: ${MYSQL_USER:-auction_user}
      AUCTION_DB_PASSWORD: ${MYSQL_PASSWORD:-auction_password}
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      - "${AUCTION_SERVER_PORT:-5000}:5000"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: auction-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --interval 60 --cleanup

volumes:
  mysql_data:
